<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>SmartHandoff — Prototype Flows Overview</title>

  <!-- Background -->
  <rect width="920" height="640" fill="#F9FAFB"/>

  <!-- Header -->
  <rect x="0" y="0" width="920" height="48" fill="#1E3A8A"/>
  <text x="20" y="30" fill="white" font-size="13" font-weight="700">SmartHandoff — Prototype Flows Overview</text>
  <text x="680" y="30" fill="rgba(255,255,255,0.6)" font-size="11">Figma Page 05 · /generate-figma · 2026-07-14</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FLOW 01: Staff Discharge Workflow -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="20" y="72" fill="#374151" font-size="11" font-weight="700" letter-spacing="0.04em">FLOW 01 — STAFF: FULL DISCHARGE WORKFLOW</text>
  <text x="20" y="86" fill="#9CA3AF" font-size="10">Persona: P-01 Nurse + P-02 Physician</text>

  <!-- Screen boxes for Flow 01 -->
  <!-- SCR-001 Login -->
  <rect x="20" y="96" width="100" height="56" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="30" y="116" fill="#4B5563" font-size="9" font-weight="700">SCR-001</text>
  <text x="30" y="129" fill="#111827" font-size="10" font-weight="600">Login</text>
  <text x="30" y="142" fill="#9CA3AF" font-size="8">/login</text>

  <!-- Arrow 1→2 -->
  <line x1="120" y1="124" x2="148" y2="124" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="125" y="118" fill="#6B7280" font-size="8">SSO click</text>

  <!-- SCR-002 Dashboard -->
  <rect x="150" y="96" width="100" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="160" y="116" fill="#4B5563" font-size="9" font-weight="700">SCR-002</text>
  <text x="160" y="129" fill="#111827" font-size="10" font-weight="600">Dashboard</text>
  <text x="160" y="142" fill="#9CA3AF" font-size="8">/dashboard</text>

  <!-- Arrow 2→3 -->
  <line x1="250" y1="124" x2="278" y2="124" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="254" y="118" fill="#6B7280" font-size="8">Patients nav</text>

  <!-- SCR-003 Patient List -->
  <rect x="280" y="96" width="100" height="56" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="290" y="116" fill="#4B5563" font-size="9" font-weight="700">SCR-003</text>
  <text x="290" y="129" fill="#111827" font-size="10" font-weight="600">Patient List</text>
  <text x="290" y="142" fill="#9CA3AF" font-size="8">/patients</text>

  <!-- Arrow 3→4 -->
  <line x1="380" y1="124" x2="408" y2="124" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="383" y="118" fill="#6B7280" font-size="8">View patient</text>

  <!-- SCR-004 Patient Detail -->
  <rect x="410" y="96" width="100" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="420" y="116" fill="#4B5563" font-size="9" font-weight="700">SCR-004</text>
  <text x="420" y="129" fill="#111827" font-size="10" font-weight="600">Patient Detail</text>
  <text x="420" y="142" fill="#9CA3AF" font-size="8">/patients/:id</text>

  <!-- Arrow 4→5 (down then right) -->
  <line x1="460" y1="152" x2="460" y2="172" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="460" y1="172" x2="538" y2="172" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="468" y="168" fill="#6B7280" font-size="8">Medications tab</text>

  <!-- SCR-005 Medication Review -->
  <rect x="540" y="152" width="100" height="56" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="550" y="172" fill="#4B5563" font-size="9" font-weight="700">SCR-005</text>
  <text x="550" y="185" fill="#111827" font-size="10" font-weight="600">Med Review</text>
  <text x="550" y="198" fill="#9CA3AF" font-size="8">/medications</text>

  <!-- Arrow 4→6 (right from detail) -->
  <line x1="510" y1="116" x2="538" y2="116" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="512" y="110" fill="#6B7280" font-size="8">Review & Approve</text>

  <!-- SCR-006 Document Review -->
  <rect x="540" y="96" width="100" height="56" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="550" y="116" fill="#4B5563" font-size="9" font-weight="700">SCR-006</text>
  <text x="550" y="129" fill="#111827" font-size="10" font-weight="600">Doc Review</text>
  <text x="550" y="142" fill="#9CA3AF" font-size="8">/documents</text>

  <!-- Arrow 6→Approved -->
  <line x1="640" y1="124" x2="668" y2="124" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="643" y="118" fill="#6B7280" font-size="8">Approve & Sign</text>

  <!-- Approved terminal -->
  <rect x="670" y="110" width="80" height="28" rx="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="678" y="129" fill="#16A34A" font-size="10" font-weight="700">✓ Approved</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FLOW 02: Bed Manager -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="20" y1="228" x2="900" y2="228" stroke="#E5E7EB" stroke-width="1"/>
  <text x="20" y="248" fill="#374151" font-size="11" font-weight="700" letter-spacing="0.04em">FLOW 02 — BED MANAGER: ED BOARDING RESOLUTION</text>
  <text x="20" y="262" fill="#9CA3AF" font-size="10">Persona: P-04 Coordinator Carol</text>

  <!-- SCR-001 -->
  <rect x="20" y="272" width="100" height="56" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="30" y="292" fill="#4B5563" font-size="9" font-weight="700">SCR-001</text>
  <text x="30" y="305" fill="#111827" font-size="10" font-weight="600">Login</text>
  <text x="30" y="318" fill="#9CA3AF" font-size="8">BedMgr role</text>

  <line x1="120" y1="300" x2="148" y2="300" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- SCR-002 BedMgr -->
  <rect x="150" y="272" width="100" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="160" y="292" fill="#4B5563" font-size="9" font-weight="700">SCR-002</text>
  <text x="160" y="305" fill="#111827" font-size="10" font-weight="600">Dashboard</text>
  <text x="160" y="318" fill="#9CA3AF" font-size="8">BedMgr view</text>

  <line x1="250" y1="300" x2="278" y2="300" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="252" y="293" fill="#6B7280" font-size="8">Bed Board nav</text>

  <!-- SCR-007 ED Alert -->
  <rect x="280" y="272" width="110" height="56" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="290" y="292" fill="#4B5563" font-size="9" font-weight="700">SCR-007</text>
  <text x="290" y="305" fill="#111827" font-size="10" font-weight="600">Bed Board</text>
  <text x="290" y="318" fill="#DC2626" font-size="9" font-weight="600">🚨 ED Alert Active</text>

  <line x1="390" y1="300" x2="418" y2="300" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="391" y="293" fill="#6B7280" font-size="8">Assign 4W-03</text>

  <!-- Modal -->
  <rect x="420" y="282" width="90" height="36" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="430" y="298" fill="#D97706" font-size="9" font-weight="600">Confirm</text>
  <text x="430" y="311" fill="#D97706" font-size="9">Modal</text>

  <line x1="510" y1="300" x2="538" y2="300" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- SCR-007 Resolved -->
  <rect x="540" y="272" width="110" height="56" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="550" y="292" fill="#4B5563" font-size="9" font-weight="700">SCR-007</text>
  <text x="550" y="305" fill="#111827" font-size="10" font-weight="600">Bed Board</text>
  <text x="550" y="318" fill="#16A34A" font-size="9" font-weight="600">✓ Alert Resolved</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FLOW 03: Patient Portal + Emergency -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="20" y1="356" x2="900" y2="356" stroke="#E5E7EB" stroke-width="1"/>
  <text x="20" y="376" fill="#374151" font-size="11" font-weight="700" letter-spacing="0.04em">FLOW 04 — PATIENT: PORTAL + CHATBOT + EMERGENCY</text>
  <text x="20" y="390" fill="#9CA3AF" font-size="10">Persona: P-05 Patient Pat (Mobile 375px)</text>

  <!-- Portal link / OTP -->
  <rect x="20" y="400" width="100" height="56" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="30" y="420" fill="#4B5563" font-size="9" font-weight="700">OTP Auth</text>
  <text x="30" y="433" fill="#111827" font-size="10" font-weight="600">SMS Link</text>
  <text x="30" y="446" fill="#9CA3AF" font-size="8">Magic link click</text>

  <line x1="120" y1="428" x2="148" y2="428" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- SCR-010 Home -->
  <rect x="150" y="400" width="100" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="160" y="420" fill="#4B5563" font-size="9" font-weight="700">SCR-010</text>
  <text x="160" y="433" fill="#111827" font-size="10" font-weight="600">Portal Home</text>
  <text x="160" y="446" fill="#9CA3AF" font-size="8">📱 375px</text>

  <line x1="250" y1="428" x2="278" y2="428" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="253" y="421" fill="#6B7280" font-size="8">Chat FAB tap</text>

  <!-- SCR-010 Chatbot Open -->
  <rect x="280" y="400" width="110" height="56" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="290" y="420" fill="#4B5563" font-size="9" font-weight="700">SCR-010</text>
  <text x="290" y="433" fill="#111827" font-size="10" font-weight="600">Chatbot Open</text>
  <text x="290" y="446" fill="#9CA3AF" font-size="8">💬 Chat panel</text>

  <line x1="390" y1="428" x2="418" y2="428" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="391" y="421" fill="#6B7280" font-size="8">Urgency signal</text>

  <!-- SCR-010 Emergency -->
  <rect x="420" y="400" width="110" height="56" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="430" y="420" fill="#4B5563" font-size="9" font-weight="700">SCR-010</text>
  <text x="430" y="433" fill="#DC2626" font-size="10" font-weight="700">🚨 EMERGENCY</text>
  <text x="430" y="446" fill="#DC2626" font-size="8">Full-screen alert</text>

  <!-- Return arrow (emergency → home) -->
  <path d="M475 456 Q475 490 335 490 Q195 490 200 456" stroke="#6B7280" stroke-width="1" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow-grey)"/>
  <text x="300" y="503" fill="#9CA3AF" font-size="8">Return to Portal</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="20" y1="540" x2="900" y2="540" stroke="#E5E7EB" stroke-width="1"/>
  <text x="20" y="558" fill="#374151" font-size="11" font-weight="700">LEGEND</text>

  <rect x="20" y="568" width="16" height="10" rx="3" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="42" y="577" fill="#4B5563" font-size="10">Active screen / current state</text>

  <rect x="160" y="568" width="16" height="10" rx="3" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="182" y="577" fill="#4B5563" font-size="10">Success / completion state</text>

  <rect x="300" y="568" width="16" height="10" rx="3" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="322" y="577" fill="#4B5563" font-size="10">Critical / alert state</text>

  <rect x="430" y="568" width="16" height="10" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="452" y="577" fill="#4B5563" font-size="10">Modal overlay (dashed)</text>

  <line x1="580" y1="573" x2="600" y2="573" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="606" y="577" fill="#4B5563" font-size="10">Primary navigation</text>

  <line x1="700" y1="573" x2="720" y2="573" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="726" y="577" fill="#4B5563" font-size="10">Alert / error path</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
