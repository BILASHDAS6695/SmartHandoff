# cloudbuild-template.yaml
# Canonical per-service Cloud Build pipeline — SmartHandoff
# Copy to services/<service-name>/cloudbuild.yaml and set _SERVICE_NAME.
#
# Pipeline stages (US-003 Scenario 1):
#   lint → unit tests → docker build → artifact push → trivy scan →
#   canary deploy (10%) → 5-min observation → full promotion (100%)
#
# Security (US-003 Scenario 4):
#   - CLOUD_LOGGING_ONLY prevents stdout secret leakage
#   - No --build-arg passes secret values; all runtime secrets from Secret Manager
#   - Trivy --exit-code 1 blocks on CRITICAL/HIGH CVEs (US-003 Scenario 2)
#
# Canary rollback (US-003 Scenario 3):
#   - 5-minute observation window polls Cloud Monitoring alert state
#   - If canary error rate >1% alert is OPEN, inline rollback executes and build fails
#   - External monitoring trigger (cloudbuild-rollback.yaml) provides belt-and-suspenders

substitutions:
  _SERVICE_NAME: 'REPLACE_ME'   # e.g., api-gateway — override in per-service copy
  _ENVIRONMENT: 'dev'           # Overridden by Cloud Build trigger substitution
  _REGION: 'us-central1'        # Overridden by Cloud Build trigger substitution
  _PROJECT_ID: 'REPLACE_ME'     # Overridden by Cloud Build trigger substitution
  _ORG_ID: 'REPLACE_ME'         # GCP organisation ID — for Cloud SCC SARIF upload

steps:
  # ── Stage 1: Lint (Python) ───────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: 'lint-python'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -f requirements.txt ] || [ -d src ]; then
          pip install flake8 --quiet
          flake8 src/ --max-line-length=120 --statistics
        else
          echo "No Python source — skipping Python lint"
        fi
    dir: 'services/${_SERVICE_NAME}'

  # ── Stage 1: Lint (Node.js/TypeScript) — parallel with lint-python ───────
  - name: 'node:20-slim'
    id: 'lint-js'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -f package.json ]; then
          npm ci --silent
          npx eslint src/ --ext .js,.ts --max-warnings=0
        else
          echo "No Node.js source — skipping JS/TS lint"
        fi
    dir: 'services/${_SERVICE_NAME}'
    waitFor: ['-']

  # ── Stage 2: Unit Tests (Python) — gated on lint ─────────────────────────
  - name: 'python:3.11-slim'
    id: 'test-python'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -f requirements.txt ] && [ -d tests ]; then
          pip install pytest pytest-cov --quiet -r requirements.txt
          pytest tests/ --cov=src/ --cov-report=term-missing --tb=short
        else
          echo "No Python tests — skipping pytest"
        fi
    dir: 'services/${_SERVICE_NAME}'
    waitFor: ['lint-python', 'lint-js']

  # ── Stage 2: Unit Tests (Node.js/TypeScript) — parallel with test-python ─
  - name: 'node:20-slim'
    id: 'test-js'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -f package.json ]; then
          npm ci --silent
          npx jest --coverage --ci
        else
          echo "No Node.js tests — skipping jest"
        fi
    dir: 'services/${_SERVICE_NAME}'
    waitFor: ['lint-python', 'lint-js']

  # ── Stage 3: Restore Trivy CVE DB cache — parallel with tests ────────────
  # allowFailure: true — cache miss on first run is acceptable
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'restore-trivy-db-cache'
    args:
      - '-m'
      - 'cp'
      - '-r'
      - 'gs://${_PROJECT_ID}-trivy-cache/.trivy'
      - '/workspace/'
    waitFor: ['-']
    allowFailure: true

  # ── Stage 4: Docker Build — gated on passing unit tests ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '--tag'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--tag'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:latest'
      - '--file'
      - 'Dockerfile'
      - '--build-arg'
      - 'SERVICE_NAME=${_SERVICE_NAME}'
      - '.'
    dir: 'services/${_SERVICE_NAME}'
    waitFor: ['test-python', 'test-js']
    # SECURITY: No --build-arg passes secret values.
    # All runtime credentials are sourced from Secret Manager at container start.

  # ── Stage 5: Push to Artifact Registry — both tags in parallel ───────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'artifact-registry-push-sha'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:${COMMIT_SHA}'
    waitFor: ['docker-build']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'artifact-registry-push-latest'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:latest'
    waitFor: ['docker-build']

  # ── Stage 6: Trivy CVE Scan — CRITICAL/HIGH blocks pipeline (exit-code 1) ─
  # US-003 Scenario 2: CRITICAL CVE → build fails here; no revision deployed
  - name: 'aquasec/trivy:latest'
    id: 'trivy-scan-critical-high'
    entrypoint: sh
    args:
      - '-c'
      - |
        trivy image \
          --exit-code 1 \
          --severity CRITICAL,HIGH \
          --format sarif \
          --output /workspace/trivy-results.sarif \
          --no-progress \
          --cache-dir /workspace/.trivy \
          ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:${COMMIT_SHA}
    waitFor: ['artifact-registry-push-sha', 'restore-trivy-db-cache']

  # MEDIUM/LOW findings produce a warning but do not fail the pipeline
  - name: 'aquasec/trivy:latest'
    id: 'trivy-scan-medium-low'
    entrypoint: sh
    args:
      - '-c'
      - |
        trivy image \
          --exit-code 0 \
          --severity MEDIUM,LOW \
          --format table \
          --no-progress \
          --cache-dir /workspace/.trivy \
          ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:${COMMIT_SHA} \
          || true
    waitFor: ['artifact-registry-push-sha', 'restore-trivy-db-cache']

  # Save Trivy DB cache to GCS for next build (reduces cold-start by ~2 minutes)
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'save-trivy-db-cache'
    args:
      - '-m'
      - 'cp'
      - '-r'
      - '/workspace/.trivy'
      - 'gs://${_PROJECT_ID}-trivy-cache/'
    waitFor: ['trivy-scan-critical-high', 'trivy-scan-medium-low']
    allowFailure: true

  # Upload SARIF report to Cloud Security Command Center for audit trail
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'upload-sarif-to-scc'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -f /workspace/trivy-results.sarif ]; then
          curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            "https://securitycenter.googleapis.com/v1/organizations/${_ORG_ID}/sources/-/findings:import" \
            --data-binary @/workspace/trivy-results.sarif \
            || echo "SARIF upload attempted — verify in Cloud SCC console"
        fi
    waitFor: ['trivy-scan-critical-high', 'trivy-scan-medium-low']

  # ── Stage 7: Deploy new Cloud Run revision — no traffic ──────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-new-revision'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE_NAME}-${_ENVIRONMENT} \
          --image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:${COMMIT_SHA} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --platform=managed \
          --no-traffic \
          --tag=canary-${COMMIT_SHA:0:7}
    waitFor: ['upload-sarif-to-scc']

  # ── Stage 8: Canary traffic split — 10% to new revision ──────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'canary-traffic-split'
    entrypoint: bash
    args:
      - '-c'
      - |
        NEW_REVISION=$(gcloud run revisions list \
          --service=${_SERVICE_NAME}-${_ENVIRONMENT} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --sort-by="~metadata.creationTimestamp" \
          --limit=1 \
          --format="value(metadata.name)")
        echo "Routing 10% canary traffic to revision: $NEW_REVISION"
        gcloud run services update-traffic ${_SERVICE_NAME}-${_ENVIRONMENT} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --to-revisions=${NEW_REVISION}=10 \
          --to-latest=no
        echo "$NEW_REVISION" > /workspace/canary_revision.txt
        echo "Canary split active: 10% → $NEW_REVISION, 90% → previous revision"
    waitFor: ['deploy-new-revision']

  # ── Stage 9: 5-minute canary observation window ───────────────────────────
  # Polls Cloud Monitoring for canary error-rate alert state every 30 seconds.
  # If alert is OPEN (error rate >1%), rolls back inline and exits with code 1.
  # US-003 Scenario 3: automatic rollback on error spike.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'canary-observation-window'
    entrypoint: bash
    args:
      - '-c'
      - |
        NEW_REVISION=$(cat /workspace/canary_revision.txt)
        echo "Canary observation: monitoring $NEW_REVISION for 5 minutes (10 x 30s polls)..."
        ROLLBACK_NEEDED=0

        for i in $(seq 1 10); do
          sleep 30
          ALERT_STATE=$(gcloud alpha monitoring incidents list \
            --project=${_PROJECT_ID} \
            --filter="policy_name:smarthandoff-${_SERVICE_NAME}-canary-error-rate" \
            --limit=1 \
            --format="value(state)" 2>/dev/null || echo "closed")
          echo "[$i/10] Alert state for $NEW_REVISION: ${ALERT_STATE:-closed}"
          if [ "${ALERT_STATE}" = "open" ]; then
            ROLLBACK_NEEDED=1
            break
          fi
        done

        if [ "$ROLLBACK_NEEDED" = "1" ]; then
          echo "ERROR: Canary error-rate alert OPEN — error rate exceeded 1% threshold"
          echo "Initiating inline rollback: restoring 100% traffic to previous revision..."
          gcloud run services update-traffic ${_SERVICE_NAME}-${_ENVIRONMENT} \
            --region=${_REGION} \
            --project=${_PROJECT_ID} \
            --to-latest
          echo "Rollback complete. Pipeline marked FAILED."
          exit 1
        fi
        echo "Observation window PASSED. Proceeding to full promotion."
    waitFor: ['canary-traffic-split']

  # ── Stage 10: Full promotion — 100% traffic to new revision ──────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'promote-full-traffic'
    entrypoint: bash
    args:
      - '-c'
      - |
        NEW_REVISION=$(cat /workspace/canary_revision.txt)
        echo "Promoting $NEW_REVISION to 100% traffic"
        gcloud run services update-traffic ${_SERVICE_NAME}-${_ENVIRONMENT} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --to-revisions=${NEW_REVISION}=100
        echo "Deployment COMPLETE: 100% traffic on $NEW_REVISION"
    waitFor: ['canary-observation-window']

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:${COMMIT_SHA}'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/smarthandoff-${_ENVIRONMENT}/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY      # Prevents log streaming to stdout (US-003 Scenario 4 — no secrets in logs)
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'

timeout: '900s'   # 15-minute DoD gate — pipeline must complete within this window
